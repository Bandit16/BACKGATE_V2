services:
  - type: web
    name: backgate-v2
    runtime: python
    pythonVersion: 3.11

    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput

    startCommand: >
      gunicorn BACKGATE_V2.wsgi:application --worker-class gthread --workers 2 --threads 4 --worker-tmp-dir /dev/shm --bind 0.0.0.0:8000

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: BACKGATE_V2.settings
      - key: PYTHONUNBUFFERED
        value: true
